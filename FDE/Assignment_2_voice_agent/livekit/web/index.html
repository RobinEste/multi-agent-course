<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aurora LiveKit Talk Test</title>
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <main>
      <header class="header">
        <div>
          <p class="eyebrow">Local LiveKit</p>
          <h1>Aurora Room Talk Test</h1>
        </div>
        <div class="room-pill">aurora-demo-room</div>
      </header>

      <section class="stage" aria-label="LiveKit participants">
        <article class="participant-card" data-client="caller">
          <div class="card-top">
            <div>
              <p class="eyebrow">Caller side</p>
              <h2>Caller Demo</h2>
            </div>
            <span class="state" data-role="status">Disconnected</span>
          </div>
          <div class="meter" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="actions">
            <button data-role="join">Join caller</button>
            <button data-role="mute" disabled>Mute</button>
            <button data-role="leave" class="secondary" disabled>Leave</button>
          </div>
          <div class="audio" data-role="audio"></div>
        </article>

        <article class="participant-card agent" data-client="agent">
          <div class="card-top">
            <div>
              <p class="eyebrow">Agent side</p>
              <h2>Aurora Agent</h2>
            </div>
            <span class="state" data-role="status">Disconnected</span>
          </div>
          <div class="meter" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="actions">
            <button data-role="join">Join agent</button>
            <button data-role="mute" disabled>Mute</button>
            <button data-role="leave" class="secondary" disabled>Leave</button>
          </div>
          <div class="audio" data-role="audio"></div>
        </article>
      </section>

      <section class="panel">
        <div>
          <p class="eyebrow">Room state</p>
          <h2>Participants</h2>
        </div>
        <div id="participants" class="participants">
          <div class="empty">Join one or both panes to see participants.</div>
        </div>
      </section>
    </main>

    <script type="module" src="/web/talk.js"></script>
  </body>
</html>
